<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nova Reserva - Ecopower</title>

  <style>
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 15px;
      color: #333;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #e5e7eb;
    }

    /* HEADER (SIMPLIFICADO + FUNDO VERDE FIXO) */
    .header {
      background: #70b630; /* fundo verde fixo */
      color: #fff;
      text-align: center;
      padding: 18px 12px;
    }

    .header h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
    }

    .header p {
      margin: 4px 0 0;
      font-size: 13px;
      opacity: 0.9;
    }

    /* CONTENT */
    .content {
      padding: 20px 22px;
    }

    .alert {
      background: #fff3cd;
      padding: 10px 12px;
      border-left: 4px solid #f4b400;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 18px;
    }

    /* BLOCO PADRÃO */
    .box {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 18px;
      border-left: 4px solid #70b630;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
      border-bottom: 1px solid #ececec;
    }

    .row:last-child {
      border-bottom: none;
    }

    /* VEÍCULO */
    .vehicle {
      background: #eef7ff;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 18px;
      border: 1px solid #d9e7f7;
    }

    .vehicle h3 {
      margin: 0 0 5px;
      font-size: 16px;
      color: #1b6dc1;
    }

    /* DATAS */
    .dates {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
    }

    .date-box {
      flex: 1;
      background: #e9f6e9;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #d9ead9;
      text-align: center;
    }

    .date-box h4 {
      margin: 0 0 4px;
      color: #2e7d32;
      font-size: 12px;
      text-transform: uppercase;
    }

    .date-box p {
      margin: 0;
      font-size: 14px;
      font-weight: 600;
      color: #1b5e20;
    }

    /* MOTIVO */
    .motivo {
      background: #fff7e1;
      padding: 14px;
      border-radius: 8px;
      border-left: 4px solid #ffa000;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .motivo h4 {
      margin: 0 0 6px;
      color: #e65100;
      font-size: 14px;
    }

    /* BOTÃO */
    .action {
      text-align: center;
      margin: 20px 0 10px;
    }

    .btn {
      background: #70b630;
      padding: 10px 26px;
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      border-radius: 20px;
      font-size: 14px;
      display: inline-block;
    }

    /* FOOTER */
    .footer {
      background: #f8f9fa;
      text-align: center;
      padding: 15px;
      font-size: 12px;
      color: #777;
      border-top: 1px solid #e4e4e4;
    }

    .footer .company {
      color: #70b630;
      font-weight: 600;
      margin-bottom: 2px;
    }

    @media (max-width: 600px) {
      .dates {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header">
      <h1>Nova Solicitação de Reserva</h1>
      <p>Sistema de Mobilidade Ecopower</p>
    </div>

    <div class="content">

      <div class="box">
        <div class="row">
          <strong>👤 Solicitante:</strong>
          <span>{{solicitante_nome}}</span>
        </div>
      </div>

      <div class="vehicle">
        <h3>🚙 Veículo</h3> 
        <p><strong>{{veiculo_nome}}</strong> </p>
        <p>Chassi: {{veiculo_placa}}</p>
      </div>

    </div>

    <div class="footer">
      <div class="company">Ecopower Energia Solar</div>
      Este é um e-mail automático, não responda.<br>
    </div>

  </div>
</body>
</html>
